# Control Room - Nginx produzione (template)
# Dominio: matteroma.duckdns.org | Porta app: 3005
# Richiede WebSocket (Socket.io). Copia: sudo cp scripts/nginx-control-room.conf /etc/nginx/sites-available/control-room && sudo nginx -t && sudo systemctl reload nginx

upstream control_room_backend {
    least_conn;
    server 127.0.0.1:3005;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name matteroma.duckdns.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matteroma.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/matteroma.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matteroma.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/ubuntu/control-room;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://control_room_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
