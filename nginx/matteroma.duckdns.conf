# Control Room - matteroma.duckdns.org
# Dominio: matteroma.duckdns.org | Porta app: 3005
# Copia in: /etc/nginx/sites-available/
# Nota: richiede limit_req_zone in nginx.conf (zone=api)

upstream control_room_backend {
    server 127.0.0.1:3005;
    keepalive 8;
}

# Rate limit per login (chiave: IP client)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name matteroma.duckdns.org;
    root /var/www/html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matteroma.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/matteroma.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matteroma.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://control_room_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://control_room_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://control_room_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
