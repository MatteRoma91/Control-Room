# Control Room - matteroma.duckdns.org
# Dominio: matteroma.duckdns.org | Porta app: 3005
# Copia in: /etc/nginx/sites-available/

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name matteroma.duckdns.org;
    root /var/www/html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matteroma.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/matteroma.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matteroma.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
